version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: redis-worker
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight-worker
    ports:
      - "5540:5540"
    depends_on:
      - redis
    volumes:
      - redisinsight-data:/db
    restart: unless-stopped
    environment:
      - RITRUSTEDORIGINS=http://localhost:5540

volumes:
  redis-data:
    driver: local
  redisinsight-data:
    driver: local

