services:
  - type: web
    name: insta-auto-worker
    runtime: bun
    plan: starter
    buildCommand: bun install && bunx prisma generate && cd packages/worker && bun install && cd ../.. && if [ -d node_modules/.prisma/client ]; then mkdir -p packages/worker/node_modules/.prisma && cp -r node_modules/.prisma/client packages/worker/node_modules/.prisma/client; fi && cd packages/worker && npm run build
    startCommand: cd packages/worker && bun dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_HOST
        sync: false
      - key: UPSTASH_REDIS_USERNAME
        sync: false
      - key: UPSTASH_REDIS_PASSWORD
        sync: false
