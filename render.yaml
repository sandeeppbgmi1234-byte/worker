services:
  - type: web
    name: insta-auto-worker
    runtime: bun
    plan: starter
    buildCommand: cd ../.. && bun install && bunx prisma generate && cd packages/worker && bun install && cd ../.. && bunx prisma generate --schema=./prisma/schema.prisma && rm -rf packages/worker/node_modules/.prisma && cp -rL node_modules/.prisma packages/worker/node_modules/.prisma && test -f packages/worker/node_modules/.prisma/client/index.js && echo "✓ Prisma client ready" || (echo "✗ Prisma setup failed" && ls -la packages/worker/node_modules/.prisma 2>&1 && exit 1) && cd packages/worker && npm run build
    startCommand: bun dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_HOST
        sync: false
      - key: UPSTASH_REDIS_USERNAME
        sync: false
      - key: UPSTASH_REDIS_PASSWORD
        sync: false
